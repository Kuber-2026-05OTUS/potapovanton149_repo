apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-server-httproute
  namespace: homework
spec:
  parentRefs:
    - name: web-server-gateway
  hostnames:
    - "homework.otus"
  rules:
    - matches:
        - path:
            type: Exact
            value: /homepage
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.html
      backendRefs:
        - name: web-server-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web-server-service
          port: 80